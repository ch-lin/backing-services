# Configure cache path, size, and validity (must be placed outside the server block)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=s3_cache:10m max_size=1g inactive=24h use_temp_path=off;

# ==========================================
# 🌐 CORS whitelist mapping (limits which domains can use JS fetch)
# Nginx will check the requested Origin; if it matches the regular expression, access is allowed.
# ==========================================
map $http_origin $cors_origin {
    default "";
    "~^https?://localhost(:[0-9]+)?$" "$http_origin";
    "~^https?://127\.0\.0\.1(:[0-9]+)?$" "$http_origin";
    "~^https?://([a-zA-Z0-9-]+\.)?chlin\.diskstation\.me$" "$http_origin";
}

server {
    listen 9000;
    server_name _;

    # Allow unlimited file upload size (used by AWS S3 API multipart upload)
    client_max_body_size 0;

    location / {
        # ==========================================
        # 🛡️ Hotlink Protection logic
        # none: Allow direct URL access from the browser
        # blocked: Allow requests without Referer or hidden by firewalls
        # Add your whitelisted domains
        # ==========================================
        valid_referers none blocked server_names
                       localhost 127.0.0.1 *.chlin.diskstation.me;

        # Default to mark as an unauthorized source
        set $is_unauthorized 0;
        if ($invalid_referer) {
            set $is_unauthorized 1;
        }

        # Exception 1: Backend AWS SDK calls (with Authorization header) are not blocked
        if ($http_authorization ~* "^AWS4-HMAC") {
            set $is_unauthorized 0;
        }

        if ($is_unauthorized) {
            return 403; # Return Forbidden
        }

        # ==========================================
        # 🌐 CORS settings (Cross-Origin Resource Sharing)
        # ==========================================
        # Handle browser preflight requests (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Amz-Date,X-Amz-Security-Token,X-Amz-Algorithm,X-Amz-Credential,X-Amz-Signature,X-Amz-SignedHeaders' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Add CORS Headers to standard requests as well ('always' ensures they are included even on errors)
        # If the origin is not in the whitelist, $cors_origin will be empty, and the browser will block the request safely
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Amz-Date,X-Amz-Security-Token,X-Amz-Algorithm,X-Amz-Credential,X-Amz-Signature,X-Amz-SignedHeaders' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,ETag' always;

        # Forward to the internal S3 container
        proxy_pass http://s3:9000;
        
        # Preserve the Host header, which the S3 protocol relies heavily on (used to determine the bucket)
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ==========================================
        # 🚀 Image cache settings
        # ==========================================
        proxy_cache s3_cache;
        proxy_cache_valid 200 302 24h;
        proxy_cache_valid 404 1m;
        # Add Debug Header to easily see HIT or MISS from browser developer tools
        add_header X-Cache-Status $upstream_cache_status;
        
        # Exclude backend SDK calls or Presigned URLs (these usually have time limits or authentication, and should not be cached)
        proxy_cache_bypass $http_authorization $arg_X-Amz-Signature;
        proxy_no_cache $http_authorization $arg_X-Amz-Signature;

        # Disable Nginx buffering to make streaming smoother
        proxy_buffering off;
    }
}
