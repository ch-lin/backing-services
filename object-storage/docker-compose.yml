name: backing-services-object-storage

x-common-env-files: &common-env-files
  - ${APP_ENV_FILE:-.env}

services:
  # 1. S3 Compatible Object Storage (Powered by SeaweedFS)
  s3:
    image: chrislusf/seaweedfs:latest
    container_name: s3
    hostname: s3
    restart: unless-stopped
    env_file: *common-env-files
    # Ports are now hidden from the host and managed securely through Nginx proxy
    volumes:
      - "${S3_DATA_PATH}:/data"
    # Generates the IAM configuration (s3.json) dynamically using env vars, then starts the S3 server.
    entrypoint: >
      /bin/sh -c "
      mkdir -p /etc/seaweedfs &&
      echo '{
        \"identities\": [
          {
            \"name\": \"admin\",
            \"credentials\": [ { \"accessKey\": \"${S3_ROOT_USER}\", \"secretKey\": \"${S3_ROOT_PASSWORD}\" } ],
            \"actions\": [ \"Admin\", \"Read\", \"Write\", \"List\", \"Tagging\", \"Policies\" ]
          },
          {
            \"name\": \"backend-service-account\",
            \"credentials\": [ { \"accessKey\": \"${S3_SVC_ACCESS_KEY}\", \"secretKey\": \"${S3_SVC_SECRET_KEY}\" } ],
            \"actions\": [ \"Admin\", \"Read\", \"Write\", \"List\", \"Tagging\", \"Policies\" ]
          }
        ]
      }' > /etc/seaweedfs/s3.json &&
      weed server -dir=/data -s3 -s3.port=9000 -s3.config=/etc/seaweedfs/s3.json -filer -filer.port=8888
      "
    networks:
      shared-services-network:
        ipv4_address: 172.16.10.21 # Shifted to .21, handing .20 over to Nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:9000/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Nginx Reverse Proxy (Hotlink Protection & Edge Gateway)
  s3-proxy:
    image: nginx:alpine
    container_name: s3-proxy
    restart: unless-stopped
    ports:
      - "${S3_API_PORT:-9000}:9000"      # Expose S3 API port through Nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      s3:
        condition: service_healthy
    networks:
      shared-services-network:
        ipv4_address: 172.16.10.20 # Takes the original static IP so backend services don't need changes

  # 3. S3 Initialization Container
  # Uses standard AWS CLI to create buckets and apply public policies, ensuring standard S3 compatibility.
  s3-setup:
    image: amazon/aws-cli:latest
    container_name: s3-setup
    depends_on:
      s3:
        condition: service_healthy
    env_file: *common-env-files
    networks:
      - shared-services-network
    entrypoint: >
      /bin/sh -c "
      echo 'S3 is healthy. Proceeding with setup...';
      export AWS_ACCESS_KEY_ID=${S3_ROOT_USER};
      export AWS_SECRET_ACCESS_KEY=${S3_ROOT_PASSWORD};
      export AWS_DEFAULT_REGION=us-east-1;

      echo 'Creating bucket...';
      aws --endpoint-url http://s3:9000 s3api create-bucket --bucket ${DEFAULT_BUCKET_NAME} || true;
      
      echo 'Setting public read policy...';
      aws --endpoint-url http://s3:9000 s3api put-bucket-policy --bucket ${DEFAULT_BUCKET_NAME} --policy '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":\"*\",\"Action\":[\"s3:GetObject\"],\"Resource\":[\"arn:aws:s3:::${DEFAULT_BUCKET_NAME}/*\"]}]}';
      
      echo 'S3 Setup completed successfully!';
      "

networks:
  shared-services-network:
    external: true
